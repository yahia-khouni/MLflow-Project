# ============================================================
# Grafana Dashboard Provisioning
# ============================================================
# Tells Grafana where to find dashboard JSON files and
# auto-load them on startup.
# ============================================================

apiVersion: 1

providers:
  - name: "default"
    orgId: 1
    folder: "MLflow Pipeline"
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
