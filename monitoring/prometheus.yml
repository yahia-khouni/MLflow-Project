# ============================================================
# Prometheus Configuration
# ============================================================
# Prometheus works by "scraping" — it sends an HTTP GET to
# each target's /metrics endpoint on a schedule (every 15s
# here) and stores the response as time-series data.
#
# Think of it like a cron job that polls your API's health
# stats every 15 seconds and saves them to a database.
# ============================================================

global:
  # How often Prometheus scrapes all targets
  scrape_interval: 15s
  # How often rules (alerts) are evaluated
  evaluation_interval: 15s

scrape_configs:
  # --- Prometheus self-monitoring ---
  # Prometheus also exposes its own metrics (meta, I know)
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # --- FastAPI prediction service ---
  # Our FastAPI app exposes metrics at GET /metrics
  # (auto-generated by prometheus-fastapi-instrumentator)
  - job_name: "fastapi"
    metrics_path: /metrics
    scrape_interval: 10s     # more frequent for the API
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "churn-prediction-api"
          environment: "development"
