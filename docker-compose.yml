# ============================================================
# ML Production Pipeline — Docker Compose
# ============================================================
# Start everything:  docker-compose up -d
# Stop everything:   docker-compose down
# View logs:         docker-compose logs -f <service-name>
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # 1. PostgreSQL — MLflow metadata backend
  # ──────────────────────────────────────────────────────────
  # This stores all MLflow data: experiment names, run IDs,
  # parameters, metrics, tags. Think of it as the "database"
  # behind MLflow's UI. We use PostgreSQL instead of SQLite
  # because it's production-grade (required by the professor).
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: mlflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mlflow-network

  # ──────────────────────────────────────────────────────────
  # 2. MinIO — S3-compatible artifact storage
  # ──────────────────────────────────────────────────────────
  # Stores large files: trained models (.jar/.pkl), plots
  # (.png), config files (.json). It's a self-hosted AWS S3.
  # MLflow talks to it using the same S3 protocol (AWS SDK),
  # which is why we set AWS_ACCESS_KEY_ID etc.
  # Port 9000 = S3 API, Port 9001 = Web console UI.
  # ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: mlflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mlflow-network

  # ──────────────────────────────────────────────────────────
  # 3. MinIO Setup — Creates the "mlflow" bucket on startup
  # ──────────────────────────────────────────────────────────
  # This is a one-time init container. It waits for MinIO to
  # be ready, then creates the bucket "mlflow" if it doesn't
  # exist. After that, it exits. Think of it like a database
  # migration that runs once at startup.
  # ──────────────────────────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: mlflow-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb myminio/${MLFLOW_BUCKET_NAME} --ignore-existing;
      mc anonymous set download myminio/${MLFLOW_BUCKET_NAME};
      echo 'MinIO bucket setup complete!';
      exit 0;
      "
    networks:
      - mlflow-network

  # ──────────────────────────────────────────────────────────
  # 4. MLflow Tracking Server — the central hub
  # ──────────────────────────────────────────────────────────
  # This is the "GitHub for ML models." It provides:
  #   - A web UI to browse experiments and compare runs
  #   - A REST API that training code calls to log data
  #   - The Model Registry (versioning + lifecycle stages)
  #
  # --backend-store-uri  → where metadata goes (PostgreSQL)
  # --default-artifact-root → where large files go (MinIO/S3)
  # --host 0.0.0.0      → listen on all interfaces (so Docker
  #                        networking works across containers)
  # ──────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: mlflow-server
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
    command: >
      mlflow server
      --backend-store-uri ${MLFLOW_BACKEND_STORE_URI}
      --default-artifact-root ${MLFLOW_DEFAULT_ARTIFACT_ROOT}
      --host 0.0.0.0
      --port 5000
    ports:
      - "${MLFLOW_PORT}:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mlflow-network

  # ──────────────────────────────────────────────────────────
  # 5. Spark Master — the coordinator
  # ──────────────────────────────────────────────────────────
  # Spark uses a master/worker architecture (like a load
  # balancer with backend servers). The master doesn't do
  # computation — it assigns tasks to workers. We connect to
  # its Web UI on port 8080 to see cluster status.
  #
  # We use the official Apache Spark image. Unlike Bitnami,
  # it doesn't have SPARK_MODE env vars — we start the
  # master/worker processes explicitly via bin/spark-class.
  # ──────────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.4.4
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=${SPARK_MASTER_PORT}
      - SPARK_MASTER_WEBUI_PORT=${SPARK_MASTER_WEBUI_PORT}
    ports:
      - "${SPARK_MASTER_PORT}:7077"
      - "${SPARK_MASTER_WEBUI_PORT}:8080"
    networks:
      - mlflow-network

  # ──────────────────────────────────────────────────────────
  # 6. Spark Workers (×2) — the actual compute nodes
  # ──────────────────────────────────────────────────────────
  # Each worker is a separate container with its own CPU and
  # memory allocation. When Spark trains a model, it splits
  # the data across these workers for parallel processing.
  # This is what makes Spark "distributed" — even though on
  # a laptop it's simulated, the architecture is the same as
  # a real cluster.
  #
  # The command tells each worker to connect to the master
  # at spark://spark-master:7077 (Docker DNS resolves this).
  # ──────────────────────────────────────────────────────────
  spark-worker-1:
    image: apache/spark:3.4.4
    container_name: spark-worker-1
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
    networks:
      - mlflow-network

  spark-worker-2:
    image: apache/spark:3.4.4
    container_name: spark-worker-2
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
    networks:
      - mlflow-network

  # ──────────────────────────────────────────────────────────
  # 7. FastAPI — prediction REST API
  # ──────────────────────────────────────────────────────────
  # This is the service you're most familiar with — it's just
  # a REST API (like Express.js but in Python). It loads the
  # trained model from MLflow's registry at startup and serves
  # predictions via POST /predict.
  #
  # For now, this is a placeholder. We'll build it in Phase 4.
  # ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fastapi-server
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
      - MODEL_NAME=${MODEL_NAME}
      - MODEL_STAGE=${MODEL_STAGE}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - MLFLOW_S3_ENDPOINT_URL=${MLFLOW_S3_ENDPOINT_URL}
    ports:
      - "${API_PORT}:8000"
    networks:
      - mlflow-network

  # ──────────────────────────────────────────────────────────
  # 8. Prometheus — metrics collector
  # ──────────────────────────────────────────────────────────
  # Prometheus scrapes (pulls) metrics from FastAPI's /metrics
  # endpoint every 15 seconds and stores them as time-series
  # data. Think of it as a cron job that says "hey API, give
  # me your stats" every 15 seconds, then saves the answers.
  # ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    depends_on:
      - api
    networks:
      - mlflow-network

  # ──────────────────────────────────────────────────────────
  # 9. Grafana — metrics visualization
  # ──────────────────────────────────────────────────────────
  # Grafana reads from Prometheus and draws beautiful charts.
  # It's like Vercel Analytics but self-hosted. We pre-
  # configure it with a Prometheus datasource so it works
  # out of the box — no manual setup needed in the UI.
  # ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana/dashboards/:/etc/grafana/provisioning/dashboards/:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus
    networks:
      - mlflow-network

# ──────────────────────────────────────────────────────────
# Docker Volumes — persistent data storage
# ──────────────────────────────────────────────────────────
# These ensure data survives container restarts.
# Without volumes, every "docker-compose down" would delete
# your database, trained models, and dashboards.
# ──────────────────────────────────────────────────────────
volumes:
  postgres-data:
  minio-data:
  prometheus-data:
  grafana-data:

# ──────────────────────────────────────────────────────────
# Docker Network — internal communication
# ──────────────────────────────────────────────────────────
# All services share one network so they can reach each
# other by container name (e.g., mlflow → postgres).
# This is like how localhost works, but each service gets
# its own hostname.
# ──────────────────────────────────────────────────────────
networks:
  mlflow-network:
    driver: bridge
